name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  push_to_registry:
    name: Push Docker images to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Go Service
        uses: docker/build-push-action@v5
        with:
          context: ./go_service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/go-service:latest

      - name: Build and push Python Service
        uses: docker/build-push-action@v5
        with:
          context: ./python_service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/python-service:latest

      - name: Build and push Rust Service
        uses: docker/build-push-action@v5
        with:
          context: ./rust_lib
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rust-service:latest